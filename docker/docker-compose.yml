version: "3.9"

services:

  outreach-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: crodlin_outreach_agent
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - APP_ENV=production
      - TZ=Asia/Kolkata
    depends_on:
      - searxng
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  searxng:
    image: searxng/searxng:latest
    container_name: crodlin_searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-changethissecretkey123}
      - SEARXNG_BIND_ADDRESS=0.0.0.0
      - GRANIAN_HOST=0.0.0.0
    volumes:
      - ../searxng-config:/etc/searxng
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3